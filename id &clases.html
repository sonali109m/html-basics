<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id & Classes</title>
</head>
<body>
    <h3>ID & CLASSES</h3>
    <!-- id can be used only for single elements -->
    <P id="para">This is my paragraph lines</P>

    <!-- class is used for multiple elements -->
    <p class="line ">Tis is also my paragraph</p>

    <!-- Emmets are used for easy and fast typing -->
     <!-- span.myspan for class emmets. -->
     <span class="myspan"></span>

     <!-- ul#unorderItems for id selection-->
     <ul id="unorderItems">
        <li class="items">First item</li>
        <li class="items">Second item</li>
        <li class="items"> Thired item</li>
        <li class="items">Forth Item</li>
        <li class="items">Fifth item</li>
     </ul>

          <!-- span#aminspan.myspan for class and id both -->

     <span id="aminspan" class="myspan"></span>

     <!--span.class1.class2.class3 for multiple classes -->
      <span class="class1 class2 class3"></span>
      <!-- to write html entities search 
        brouswer -->
</body>
</html>
