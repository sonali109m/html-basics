<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline & Block elements</title>
</head>
<body>
    <!-- these are blocek elements. -->
    <h1 style="border: 2px solid red;">This is headings.</h1>
    <p style="border: 2px solid green;">This is paragraph.</p>
    <div style="border: 2px solid blue;">This is div section tag.</div>
    <section style="border: 2px solid peru;">This is section tag.</section>
    <table style="border: 2px solid tomato;">This is table tag.</table>
    <form style="border: 2px solid turquoise;">This is form tag.</form>
    <ul style="border: 2px solid aqua;">This is  unorder list.</ul>
    <li style="border: 1px solid red;">This is list items.</li>
    <!-- these are block line elements -->
    <strong style="border: 3px solid peachpuff;">This is strong tag.</strong>
    <a style="border: 3px solid black;">This is ancore tag.</a>
    <em style="border: 3px solid blueviolet;">This sentance is emphasized.</em>
</body>
</html>
