<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation bar</title>
    <style>
        *{

        }
        .nav{
            background-color: #1c5b04;
            border-radius: 40px;
            margin: auto 5px;
            width: 98%;
            height: 50px;
            
        }
        .nav a{
            color: white;
            text-decoration: none;
            
        }
        .nav li{
            float: left;
            list-style: none;

            margin: 25px;
            
        }
        
        .item{
            overflow: auto;
            /* height: 50px; */
        }
        .text{
            margin-top: 10px;
            margin-left: 70%;
            /* padding: 5px; */
        }
        .item a:hover{
            color:#38a70b;
        }
        .nav input{
            width: 300px;
            height: 30px;
            border-radius: 40px;
            text-align: center;
            color: rgb(47, 14, 14);
        }
    </style>
</head>
<body>
    <header class="nav">
        <ul class="item">
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Products</a></li>
            <li><a href="">Contact us</a></li>
            <div class="text">
                <label for="search"></label>
                <input type="text"  id="search"name="search" placeholder="Search here"> 
            </div>
            
        </ul>
        
    </header>
</body>
</html>
